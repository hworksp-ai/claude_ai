<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실뭉치 🧶 뜨개 도안 찾기</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF6F1; --ivory: #FFF8F0; --beige: #EDE0D4;
      --rose: #C9897A; --rose-light: #F2D9D3; --sage: #8FAF8A; --sage-light: #D6E8D4;
      --brown: #3D2B1F; --brown-mid: #7A5C4E; --brown-light: #B89880;
      --tag-lavender: #E0D4F0; --tag-peach: #F9DDD4; --tag-mint: #D4EDE8;
      --tag-yellow: #F9EDD4; --tag-pink: #F5D4E4;
    }
    body { background: var(--cream); font-family: 'Gowun Dodum', sans-serif; color: var(--brown); min-height: 100vh; }
    header { background: var(--ivory); border-bottom: 2px solid var(--beige); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(61,43,31,0.06); }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-icon { font-size: 26px; animation: wobble 3s ease-in-out infinite; }
    @keyframes wobble { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--rose); font-style: italic; }
    .logo-sub { font-size: 10px; color: var(--brown-light); margin-top: 2px; }
    .header-nav { display: flex; gap: 8px; }
    .nav-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--beige); background: transparent; color: var(--brown-mid); font-family: 'Gowun Dodum', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .nav-btn:hover, .nav-btn.active { background: var(--rose); color: white; border-color: var(--rose); }
    main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .api-banner { background: var(--rose-light); border: 1.5px dashed var(--rose); border-radius: 16px; padding: 18px 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .api-banner-text { flex: 1; min-width: 180px; }
    .api-banner-text p { font-size: 12px; color: var(--brown-mid); margin-top: 4px; }
    .api-banner h3 { font-size: 14px; color: var(--brown); }
    .api-input-row { display: flex; gap: 8px; flex: 2; min-width: 260px; }
    .api-input { flex: 1; padding: 9px 14px; border-radius: 12px; border: 1.5px solid var(--rose); background: white; font-family: 'Gowun Dodum', sans-serif; font-size: 13px; color: var(--brown); outline: none; }
    .api-save-btn { padding: 9px 18px; border-radius: 12px; border: none; background: var(--rose); color: white; font-family: 'Gowun Dodum', sans-serif; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .api-connected { display: flex; align-items: center; gap: 8px; background: var(--sage-light); border: 1.5px solid var(--sage); border-radius: 16px; padding: 11px 18px; margin-bottom: 24px; font-size: 13px; color: var(--brown); }
    .tabs { display: flex; gap: 4px; background: var(--beige); border-radius: 14px; padding: 4px; margin-bottom: 22px; width: fit-content; }
    .tab { padding: 7px 18px; border-radius: 10px; border: none; background: transparent; font-family: 'Gowun Dodum', sans-serif; font-size: 13px; color: var(--brown-mid); cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--ivory); color: var(--brown); box-shadow: 0 1px 4px rgba(61,43,31,0.08); }
    .search-bar { display: flex; gap: 10px; background: var(--ivory); border: 2px solid var(--beige); border-radius: 20px; padding: 7px 7px 7px 18px; margin-bottom: 22px; box-shadow: 0 2px 8px rgba(61,43,31,0.05); }
    .search-bar:focus-within { border-color: var(--rose); }
    .search-input { flex: 1; border: none; background: transparent; font-family: 'Gowun Dodum', sans-serif; font-size: 14px; color: var(--brown); outline: none; }
    .search-input::placeholder { color: var(--brown-light); }
    .search-btn { padding: 9px 22px; border-radius: 14px; border: none; background: var(--rose); color: white; font-family: 'Gowun Dodum', sans-serif; font-size: 13px; cursor: pointer; }
    .search-btn:hover { background: #b87060; }
    .filter-section { margin-bottom: 26px; }
    .filter-label { font-size: 11px; color: var(--brown-light); margin-bottom: 10px; letter-spacing: 0.5px; }
    .filter-categories { display: flex; flex-direction: column; gap: 9px; }
    .filter-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .filter-cat-label { font-size: 11px; color: var(--brown-light); min-width: 48px; }
    .tag-chip { padding: 4px 11px; border-radius: 20px; border: 1.5px solid var(--beige); background: var(--ivory); color: var(--brown-mid); font-family: 'Gowun Dodum', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .tag-chip:hover { border-color: var(--rose); color: var(--rose); }
    .tag-chip.active { color: white; }
    .tag-chip.cat-기법.active { background: #9B8EC4; border-color: #9B8EC4; }
    .tag-chip.cat-아이템.active { background: var(--rose); border-color: var(--rose); }
    .tag-chip.cat-캐릭터.active { background: #C47BA0; border-color: #C47BA0; }
    .tag-chip.cat-동물.active { background: var(--sage); border-color: var(--sage); }
    .tag-chip.cat-난이도.active { background: #C4A35A; border-color: #C4A35A; }
    .tag-chip.cat-도안.active { background: #5A9EC4; border-color: #5A9EC4; }
    .results-count { font-size: 12px; color: var(--brown-light); margin-bottom: 14px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
    .video-card { background: var(--ivory); border-radius: 20px; border: 1.5px solid var(--beige); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(61,43,31,0.05); cursor: pointer; }
    .video-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(61,43,31,0.10); }
    .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--beige); }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .video-card:hover .thumb-wrap img { transform: scale(1.04); }
    .status-badge { position: absolute; top: 9px; left: 9px; padding: 3px 8px; border-radius: 10px; font-size: 10px; z-index: 2; }
    .status-not { background: rgba(255,255,255,0.88); color: var(--brown-mid); }
    .status-progress { background: #FFF3C0; color: #7A6000; }
    .status-done { background: var(--sage-light); color: #2A5A2A; }
    .bookmark-btn { position: absolute; top: 9px; right: 9px; width: 30px; height: 30px; background: white; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); transition: transform 0.15s; z-index: 2; }
    .bookmark-btn:hover { transform: scale(1.15); }
    .card-body { padding: 12px 14px 14px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--brown); line-height: 1.4; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-channel { font-size: 11px; color: var(--brown-light); margin-bottom: 9px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-tag { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-family: 'Gowun Dodum', sans-serif; }
    .card-tag.cat-기법 { background: var(--tag-lavender); color: #6B5A9E; }
    .card-tag.cat-아이템 { background: var(--tag-peach); color: #9E5A4A; }
    .card-tag.cat-캐릭터 { background: var(--tag-pink); color: #9E4A78; }
    .card-tag.cat-동물 { background: var(--tag-mint); color: #3A8A78; }
    .card-tag.cat-난이도 { background: var(--tag-yellow); color: #8A7030; }
    .card-tag.cat-도안 { background: #D4E4F0; color: #3A6A8A; }
    .state-box { text-align: center; padding: 50px 20px; color: var(--brown-light); }
    .state-box .icon { font-size: 44px; margin-bottom: 14px; }
    .state-box h3 { font-size: 15px; color: var(--brown-mid); margin-bottom: 6px; }
    .state-box p { font-size: 12px; }
    .spinner { display: inline-block; width: 36px; height: 36px; border: 3px solid var(--beige); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DETAIL ── */
    .detail-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; font-family: 'Gowun Dodum', sans-serif; font-size: 13px; color: var(--brown-mid); cursor: pointer; margin-bottom: 20px; padding: 0; }
    .detail-back:hover { color: var(--rose); }
    .detail-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
    @media (max-width: 800px) { .detail-layout { grid-template-columns: 1fr; } }
    .detail-video-wrap { border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; }
    .detail-video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    /* 썸네일 오버레이 — 재생 전/오류 시 덮음 */
    .vid-overlay { position: absolute; inset: 0; cursor: pointer; transition: opacity 0.3s; }
    .vid-overlay img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vid-overlay .play-ring { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); }
    .vid-overlay .play-ring span { width: 68px; height: 68px; background: rgba(255,0,0,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; padding-left: 5px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: transform 0.15s; }
    .vid-overlay:hover .play-ring span { transform: scale(1.1); }
    .vid-overlay.hidden { opacity: 0; pointer-events: none; }
    .detail-panel { background: var(--ivory); border-radius: 20px; border: 1.5px solid var(--beige); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .detail-title { font-size: 14px; font-weight: 700; line-height: 1.5; color: var(--brown); }
    .detail-channel { font-size: 12px; color: var(--brown-light); margin-top: -10px; }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 5px; }

    /* STATUS */
    .section-label { font-size: 11px; color: var(--brown-light); margin-bottom: 8px; letter-spacing: 0.4px; }
    .status-row { display: flex; gap: 6px; }
    .s-btn { flex: 1; padding: 8px 4px; border-radius: 10px; border: 1.5px solid var(--beige); background: transparent; font-family: 'Gowun Dodum', sans-serif; font-size: 11px; color: var(--brown-mid); cursor: pointer; text-align: center; transition: all 0.15s; }
    .s-btn.on-not { background: var(--beige); border-color: var(--beige); color: var(--brown); font-weight: 600; }
    .s-btn.on-progress { background: #FFF3C0; border-color: #D4B800; color: #7A6000; font-weight: 600; }
    .s-btn.on-done { background: var(--sage-light); border-color: var(--sage); color: #2A5A2A; font-weight: 600; }

    /* TIMER */
    .timer-box { background: var(--cream); border-radius: 14px; padding: 14px 16px; text-align: center; }
    .timer-display { font-size: 30px; font-weight: 700; color: var(--brown); letter-spacing: 3px; margin-bottom: 10px; }
    .timer-btns { display: flex; gap: 8px; justify-content: center; }
    .t-btn { padding: 8px 18px; border-radius: 12px; border: none; font-family: 'Gowun Dodum', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .t-start { background: var(--rose); color: white; }
    .t-start:hover { background: #b87060; }
    .t-reset { background: var(--beige); color: var(--brown-mid); }
    .t-reset:hover { background: #cbb8a8; }

    /* COUNTERS */
    .counter-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--beige); }
    .counter-row:last-child { border-bottom: none; }
    .counter-name { font-size: 13px; color: var(--brown); }
    .counter-ctrl { display: flex; align-items: center; gap: 8px; }
    .c-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--beige); background: var(--cream); color: var(--brown-mid); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; font-family: 'Gowun Dodum', sans-serif; }
    .c-btn:hover { background: var(--rose); color: white; border-color: var(--rose); }
    .c-reset { width: 22px; height: 22px; border-radius: 50%; border: none; background: none; color: var(--brown-light); font-size: 13px; cursor: pointer; }
    .c-reset:hover { color: var(--rose); }
    .c-val { font-size: 22px; font-weight: 700; color: var(--brown); min-width: 38px; text-align: center; }

    /* NOTES */
    .notes-area { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1.5px solid var(--beige); background: var(--cream); font-family: 'Gowun Dodum', sans-serif; font-size: 12px; color: var(--brown); resize: vertical; min-height: 72px; outline: none; }
    .notes-area:focus { border-color: var(--rose); }

    /* ACTIONS */
    .detail-actions { display: flex; gap: 8px; }
    .d-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--beige); background: transparent; font-family: 'Gowun Dodum', sans-serif; font-size: 12px; color: var(--brown-mid); cursor: pointer; text-align: center; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s; }
    .d-btn:hover { background: var(--beige); }
    .d-btn.primary { background: var(--rose); color: white; border-color: var(--rose); }
    .d-btn.primary:hover { background: #b87060; }

    @media (max-width: 600px) {
      header { padding: 12px 14px; }
      main { padding: 16px 12px; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">
    <span class="logo-icon">🧶</span>
    <div>
      <div class="logo-text">실뭉치</div>
      <div class="logo-sub">뜨개 도안 찾기</div>
    </div>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" id="nav-search" onclick="showTab('search')">검색</button>
    <button class="nav-btn" id="nav-bm" onclick="showTab('bookmarks')">북마크 <span id="bm-count"></span></button>
  </div>
</header>

<main>
  <div id="api-banner" class="api-banner">
    <div class="api-banner-text">
      <h3>🔑 YouTube API 키 설정</h3>
      <p>Google Cloud Console에서 발급한 API 키를 입력하세요</p>
    </div>
    <div class="api-input-row">
      <input class="api-input" id="api-key-input" type="password" placeholder="AIza..." />
      <button class="api-save-btn" onclick="saveApiKey()">저장</button>
    </div>
  </div>
  <div id="api-connected" class="api-connected" style="display:none">
    ✅ API 키 연결됨 &nbsp;·&nbsp; <span style="color:var(--brown-light);font-size:11px">키를 변경하려면 새로고침하세요</span>
  </div>

  <div class="tabs" id="main-tabs">
    <button class="tab active" id="tab-search" onclick="showTab('search')">🔍 검색</button>
    <button class="tab" id="tab-bm" onclick="showTab('bookmarks')">🔖 북마크</button>
  </div>

  <!-- SEARCH -->
  <div id="view-search">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="코바늘 가방, 플레이브 인형, 강아지 뜨개..." onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="search-btn" onclick="doSearch()">검색 🧶</button>
    </div>
    <div class="filter-section">
      <div class="filter-label">태그로 필터링</div>
      <div class="filter-categories" id="filter-area"></div>
    </div>
    <div class="results-count" id="results-count"></div>
    <div id="results-area">
      <div class="state-box">
        <div class="icon">🧶</div>
        <h3>어떤 도안을 찾고 있나요?</h3>
        <p>검색어를 입력하거나 태그를 눌러보세요</p>
      </div>
    </div>
  </div>

  <!-- BOOKMARKS -->
  <div id="view-bookmarks" style="display:none">
    <div id="bm-area"></div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" style="display:none">
    <button class="detail-back" onclick="closeDetail()">← 목록으로</button>
    <div class="detail-layout">
      <div class="detail-video-wrap">
        <div id="detail-player"></div>
        <!-- 썸네일 오버레이: 클릭하면 재생 시도 -->
        <div class="vid-overlay" id="vid-overlay" onclick="tryPlay()">
          <img id="vid-thumb" src="" alt="" />
          <div class="play-ring"><span>▶</span></div>
        </div>
      </div>
      <div class="detail-panel">
        <div>
          <div class="detail-title" id="d-title"></div>
          <div class="detail-channel" id="d-channel"></div>
        </div>
        <div class="detail-tags" id="d-tags"></div>

        <!-- STATUS -->
        <div>
          <div class="section-label">진행 상태</div>
          <div class="status-row">
            <button class="s-btn" id="s-not" onclick="setStatus('not')">⬜ 시작 전</button>
            <button class="s-btn" id="s-progress" onclick="setStatus('progress')">🪡 진행 중</button>
            <button class="s-btn" id="s-done" onclick="setStatus('done')">✅ 완성!</button>
          </div>
        </div>

        <!-- TIMER -->
        <div class="timer-box">
          <div class="section-label">⏱ 뜨개 시간</div>
          <div class="timer-display" id="timer-disp">00:00:00</div>
          <div class="timer-btns">
            <button class="t-btn t-start" id="t-toggle" onclick="toggleTimer()">▶ 시작</button>
            <button class="t-btn t-reset" onclick="resetTimer()">↺ 초기화</button>
          </div>
        </div>

        <!-- COUNTERS -->
        <div>
          <div class="section-label">단수 · 코 수 카운터</div>
          <div class="counter-row">
            <span class="counter-name">단수 1</span>
            <div class="counter-ctrl">
              <button class="c-reset" onclick="resetC(0)" title="초기화">↺</button>
              <button class="c-btn" onclick="chgC(0,-1)">−</button>
              <span class="c-val" id="c0">0</span>
              <button class="c-btn" onclick="chgC(0,1)">+</button>
            </div>
          </div>
          <div class="counter-row">
            <span class="counter-name">단수 2</span>
            <div class="counter-ctrl">
              <button class="c-reset" onclick="resetC(1)" title="초기화">↺</button>
              <button class="c-btn" onclick="chgC(1,-1)">−</button>
              <span class="c-val" id="c1">0</span>
              <button class="c-btn" onclick="chgC(1,1)">+</button>
            </div>
          </div>
          <div class="counter-row">
            <span class="counter-name">코 수</span>
            <div class="counter-ctrl">
              <button class="c-reset" onclick="resetC(2)" title="초기화">↺</button>
              <button class="c-btn" onclick="chgC(2,-1)">−</button>
              <span class="c-val" id="c2">0</span>
              <button class="c-btn" onclick="chgC(2,1)">+</button>
            </div>
          </div>
        </div>

        <!-- NOTES -->
        <div>
          <div class="section-label">📝 메모</div>
          <textarea class="notes-area" id="d-notes" placeholder="실 종류, 바늘 호수, 특이사항..." oninput="saveP()"></textarea>
        </div>

        <!-- ACTIONS -->
        <div class="detail-actions">
          <a id="d-yt" class="d-btn primary" target="_blank" href="#">▶ YouTube에서 보기</a>
          <button class="d-btn" id="d-bm-btn" onclick="toggleBmDetail()">🤍 북마크</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// YouTube IFrame API
let ytPlayer = null;
let ytReady = false;
let pendingVideoId = null;
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  if(pendingVideoId) { _createPlayer(pendingVideoId); pendingVideoId = null; }
};
(function(){
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

// 상세 페이지 진입 시: 썸네일만 세팅, 플레이어 아직 안 띄움
function prepareVideo(v) {
  const thumb = v.thumb || `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
  document.getElementById('vid-thumb').src = thumb;
  const overlay = document.getElementById('vid-overlay');
  overlay.classList.remove('hidden');
  overlay.onclick = tryPlay;
}

// 사용자가 재생 버튼 클릭
function tryPlay() {
  if(!currentVideo) return;
  const id = currentVideo.id;
  if(!ytReady) { pendingVideoId = id; return; }
  if(ytPlayer) {
    ytPlayer.loadVideoById(id);
  } else {
    _createPlayer(id);
  }
}

function _createPlayer(videoId) {
  ytPlayer = new YT.Player('detail-player', {
    width: '100%', height: '100%',
    videoId,
    playerVars: { rel: 0, autoplay: 1 },
    events: {
      onStateChange: function(e) {
        // 실제 재생 시작되면 오버레이 숨김
        if(e.data === YT.PlayerState.PLAYING) {
          document.getElementById('vid-overlay').classList.add('hidden');
        }
      },
      onError: function() {
        // 재생 불가 → YouTube 새 탭으로 이동
        if(currentVideo) window.open(`https://www.youtube.com/watch?v=${currentVideo.id}`, '_blank');
      }
    }
  });
}

const TAG_MAP = {
  기법: { keywords: { '대바늘':['대바늘','knitting','knit'], '코바늘':['코바늘','크로셰','crochet'], '펀치니들':['펀치니들','punch needle'], '태피스트리':['태피스트리','tapestry'] }, color:'cat-기법' },
  난이도: { keywords: { '입문·초보':['입문','초보','beginner','쉬운'], '중급':['중급','intermediate'], '고급':['고급','advanced'] }, color:'cat-난이도' },
  아이템: { keywords: { '가방':['가방','bag','파우치','pouch'], '모자':['모자','hat','비니','beanie'], '스웨터':['스웨터','sweater','니트'], '양말':['양말','sock'], '숄·목도리':['숄','목도리','shawl','scarf'], '인형':['인형','amigurumi','아미구루미'], '카디건':['카디건','cardigan'] }, color:'cat-아이템' },
  캐릭터: { keywords: { '플레이브':['플레이브','plave','노아','은호','밤비','하민','예준'], '므메미무':['므메미무'], '산리오':['산리오','sanrio','헬로키티','시나모롤'], '포켓몬':['포켓몬','pokemon','피카츄'], '지브리':['지브리','ghibli','토토로'], '디즈니':['디즈니','disney'] }, color:'cat-캐릭터' },
  동물: { keywords: { '강아지':['강아지','dog','puppy'], '고양이':['고양이','cat','kitty'], '토끼':['토끼','bunny','rabbit'], '곰':['곰','bear','테디'], '개구리':['개구리','frog'], '문어':['문어','octopus'], '공룡':['공룡','dinosaur'] }, color:'cat-동물' },
  도안: { keywords: { '무료도안':['무료도안','free pattern','무료 도안'], '도안공유':['도안공유','도안 공유','패턴'], '유료도안':['유료도안','유료 도안'] }, color:'cat-도안' }
};

let API_KEY = localStorage.getItem('yt_api_key') || '';
let bookmarks = JSON.parse(localStorage.getItem('knit_bm') || '[]');
let progress = JSON.parse(localStorage.getItem('knit_prog') || '{}');
let activeFilters = new Set();
let lastResults = [];
let currentVideo = null;
let prevTab = 'search';
let timerInt = null, timerSec = 0, timerOn = false;
let counters = [0,0,0];

window.onload = () => { if(API_KEY) showConnected(); renderFilters(); updateBmCount(); };

function saveApiKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if(!v) return alert('API 키를 입력해주세요');
  API_KEY=v; localStorage.setItem('yt_api_key',v); showConnected();
}
function showConnected() {
  document.getElementById('api-banner').style.display='none';
  document.getElementById('api-connected').style.display='flex';
}

function showTab(tab) {
  ['search','bookmarks'].forEach(t=>{
    document.getElementById(`view-${t}`).style.display = t===tab?'block':'none';
    document.getElementById(`tab-${t==='bookmarks'?'bm':t}`).classList.toggle('active', t===tab);
    document.getElementById(`nav-${t==='bookmarks'?'bm':t}`).classList.toggle('active', t===tab);
  });
  document.getElementById('view-detail').style.display='none';
  document.getElementById('main-tabs').style.display='flex';
  if(tab==='bookmarks') renderBm();
  prevTab=tab; stopTimer();
}
function goHome() { showTab('search'); }

function renderFilters() {
  const a=document.getElementById('filter-area'); a.innerHTML='';
  for(const [cat,data] of Object.entries(TAG_MAP)){
    const row=document.createElement('div'); row.className='filter-row';
    row.innerHTML=`<span class="filter-cat-label">${cat}</span>`;
    for(const tag of Object.keys(data.keywords)){
      const b=document.createElement('button');
      b.className=`tag-chip ${data.color}`; b.textContent=tag;
      b.onclick=()=>toggleFilter(tag,b); row.appendChild(b);
    }
    a.appendChild(row);
  }
}
function toggleFilter(tag,btn){
  if(activeFilters.has(tag)){activeFilters.delete(tag);btn.classList.remove('active');}
  else{activeFilters.add(tag);btn.classList.add('active');}
  applyFilters();
}

async function doSearch(){
  if(!API_KEY){alert('먼저 API 키를 저장해주세요 🔑');return;}
  const q=document.getElementById('search-input').value.trim();
  const fq=[...activeFilters].join(' ');
  const query=(q+' '+fq+' 뜨개 도안').trim();
  document.getElementById('results-area').innerHTML=`<div class="state-box"><div class="spinner"></div><p>영상 찾는 중...</p></div>`;
  document.getElementById('results-count').textContent='';
  try{
    const res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=24&q=${encodeURIComponent(query)}&key=${API_KEY}&relevanceLanguage=ko&videoEmbeddable=true`);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    lastResults=data.items.map(item=>({
      id:item.id.videoId, title:item.snippet.title, channel:item.snippet.channelTitle,
      thumb:item.snippet.thumbnails.medium.url, description:item.snippet.description,
      tags:extractTags(item.snippet.title+' '+item.snippet.description)
    }));
    renderCards(lastResults,'results-area');
    document.getElementById('results-count').textContent=`영상 ${lastResults.length}개`;
  }catch(e){
    document.getElementById('results-area').innerHTML=`<div class="state-box"><div class="icon">😢</div><h3>검색 실패</h3><p>${e.message}</p></div>`;
  }
}

function extractTags(text){
  const low=text.toLowerCase(); const found=[];
  for(const [,data] of Object.entries(TAG_MAP))
    for(const [tag,kws] of Object.entries(data.keywords))
      if(kws.some(k=>low.includes(k.toLowerCase()))) found.push({tag,color:data.color});
  return found;
}
function applyFilters(){
  if(!activeFilters.size){renderCards(lastResults,'results-area');return;}
  const f=lastResults.filter(v=>[...activeFilters].some(af=>v.tags.some(t=>t.tag===af)));
  renderCards(f,'results-area');
  document.getElementById('results-count').textContent=`${f.length}개 표시 중`;
}

function getStatusBadge(id){
  const s=(progress[id]||{}).status||'not';
  if(s==='not') return `<span class="status-badge status-not">시작 전</span>`;
  if(s==='progress') return `<span class="status-badge status-progress">🪡 진행 중</span>`;
  return `<span class="status-badge status-done">✅ 완성</span>`;
}

function renderCards(vids, areaId){
  const a=document.getElementById(areaId);
  if(!vids.length){a.innerHTML=`<div class="state-box"><div class="icon">🔍</div><h3>결과가 없어요</h3><p>다른 검색어나 태그를 시도해보세요</p></div>`;return;}
  a.innerHTML=`<div class="video-grid">${vids.map(cardHTML).join('')}</div>`;
}
function cardHTML(v){
  const isBm=bookmarks.some(b=>b.id===v.id);
  const tags=v.tags.slice(0,4).map(t=>`<span class="card-tag ${t.color}">${t.tag}</span>`).join('');
  return `<div class="video-card" onclick="openDetail('${v.id}')">
    <div class="thumb-wrap">
      <img src="${v.thumb}" alt="" loading="lazy"/>
      ${getStatusBadge(v.id)}
      <button class="bookmark-btn" onclick="event.stopPropagation();toggleBm('${v.id}')">${isBm?'🔖':'🤍'}</button>
    </div>
    <div class="card-body">
      <div class="card-title">${v.title}</div>
      <div class="card-channel">${v.channel}</div>
      <div class="card-tags">${tags}</div>
    </div>
  </div>`;
}

// BOOKMARK
function toggleBm(id){
  const v=lastResults.find(x=>x.id===id)||bookmarks.find(x=>x.id===id);
  if(!v) return;
  const i=bookmarks.findIndex(x=>x.id===id);
  if(i>=0) bookmarks.splice(i,1); else bookmarks.push(v);
  localStorage.setItem('knit_bm',JSON.stringify(bookmarks));
  updateBmCount(); applyFilters();
  if(document.getElementById('view-bookmarks').style.display!=='none') renderBm();
  if(currentVideo?.id===id) updateBmBtn();
}
function toggleBmDetail(){ if(currentVideo) toggleBm(currentVideo.id); }
function updateBmCount(){ document.getElementById('bm-count').textContent=bookmarks.length?`(${bookmarks.length})`:''; }
function renderBm(){
  const a=document.getElementById('bm-area');
  if(!bookmarks.length){a.innerHTML=`<div class="state-box"><div class="icon">🔖</div><h3>저장된 도안이 없어요</h3><p>마음에 드는 영상에 북마크를 눌러보세요</p></div>`;return;}
  a.innerHTML=`<div class="video-grid">${bookmarks.map(cardHTML).join('')}</div>`;
}
function updateBmBtn(){
  const isBm=bookmarks.some(b=>b.id===currentVideo?.id);
  document.getElementById('d-bm-btn').textContent=isBm?'🔖 저장됨':'🤍 북마크';
}

// DETAIL
function openDetail(id){
  const v=lastResults.find(x=>x.id===id)||bookmarks.find(x=>x.id===id);
  if(!v) return;
  saveP();
  currentVideo=v;
  stopTimer();
  const p=progress[id]||{};
  counters=[...(p.counters||[0,0,0])];
  timerSec=p.timerSec||0;
  document.getElementById('d-title').textContent=v.title;
  document.getElementById('d-channel').textContent=v.channel;
  document.getElementById('d-yt').href=`https://www.youtube.com/watch?v=${id}`;
  prepareVideo(v);
  document.getElementById('d-tags').innerHTML=v.tags.map(t=>`<span class="card-tag ${t.color}">${t.tag}</span>`).join('');
  document.getElementById('d-notes').value=p.notes||'';
  setStatus(p.status||'not', false);
  updateCUI(); updateTimerDisp(); updateBmBtn();
  ['search','bookmarks'].forEach(t=>{ document.getElementById(`view-${t}`).style.display='none'; });
  document.getElementById('main-tabs').style.display='none';
  document.getElementById('view-detail').style.display='block';
  window.scrollTo(0,0);
}
function closeDetail(){
  stopTimer(); saveP();
  if(ytPlayer) { ytPlayer.stopVideo(); ytPlayer.destroy(); ytPlayer = null; }
  document.getElementById('vid-overlay').classList.remove('hidden');
  document.getElementById('view-detail').style.display='none';
  document.getElementById('main-tabs').style.display='flex';
  showTab(prevTab);
}

// STATUS
function setStatus(s, sv=true){
  ['not','progress','done'].forEach(k=>{
    const b=document.getElementById(`s-${k}`);
    b.className='s-btn';
    if(k===s) b.classList.add(`on-${k}`);
  });
  if(sv && currentVideo){
    if(!progress[currentVideo.id]) progress[currentVideo.id]={};
    progress[currentVideo.id].status=s;
    saveP();
  }
}

// TIMER
function toggleTimer(){ timerOn ? stopTimer() : startTimer(); }
function startTimer(){
  timerOn=true;
  document.getElementById('t-toggle').textContent='⏸ 일시정지';
  document.getElementById('t-toggle').style.background='#b87060';
  timerInt=setInterval(()=>{ timerSec++; updateTimerDisp(); },1000);
}
function stopTimer(){
  timerOn=false; clearInterval(timerInt);
  const b=document.getElementById('t-toggle');
  if(b){ b.textContent='▶ 시작'; b.style.background='var(--rose)'; }
}
function resetTimer(){ stopTimer(); timerSec=0; updateTimerDisp(); saveP(); }
function updateTimerDisp(){
  const h=String(Math.floor(timerSec/3600)).padStart(2,'0');
  const m=String(Math.floor((timerSec%3600)/60)).padStart(2,'0');
  const s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timer-disp').textContent=`${h}:${m}:${s}`;
}

// COUNTERS
function chgC(i,d){ counters[i]=Math.max(0,counters[i]+d); updateCUI(); saveP(); }
function resetC(i){ counters[i]=0; updateCUI(); saveP(); }
function updateCUI(){ [0,1,2].forEach(i=>{ document.getElementById(`c${i}`).textContent=counters[i]; }); }

// SAVE
function saveP(){
  if(!currentVideo) return;
  const id=currentVideo.id;
  if(!progress[id]) progress[id]={};
  const curStatus=['not','progress','done'].find(k=>document.getElementById(`s-${k}`)?.classList.contains(`on-${k}`))||'not';
  progress[id].status=curStatus;
  progress[id].counters=[...counters];
  progress[id].timerSec=timerSec;
  progress[id].notes=document.getElementById('d-notes')?.value||'';
  localStorage.setItem('knit_prog',JSON.stringify(progress));
}
</script>
